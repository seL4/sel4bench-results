# Condensed set of sel4bench benchmarks results over time.
#
# The fields that are tracked from a single sel4bench metic is are:
#
#   [min, q1, median, mean, q3, max, stddev, n]
#
# For early processing, only mean, stdev and n are tracked, the rest is 0.
#
# The fields in this file define where to find the corresponding results
# in the sel4bench JSON output (name + field match where necessary), and
# whether distribution data is availble (min, q1, median, q3, max).
#
# Fields:
#   key          used as the dict key in the series files.
#   name         label for tables/plots.
#   benchmark    the "Benchmark" section name in the sel4bench JSON.
#   match        fields to identify the row in that section if there is more
#                than one.
#   distribution false for early-processing benchmarks

metrics:

  # --- IPC
  - key: ipc_call
    name: IPC Call (cross-AS, len 0)
    benchmark: One way IPC microbenchmarks
    match: {Function: seL4_Call, "Same vspace?": false, "IPC length": 0}
    distribution: true

  - key: ipc_reply
    name: IPC ReplyRecv (cross-AS, len 0)
    benchmark: One way IPC microbenchmarks
    match: {Function: seL4_ReplyRecv, "Same vspace?": false, "IPC length": 0}
    distribution: true

  - key: ipc_call_fpu
    name: IPC Call w/ FPU (cross-AS, len 0)
    benchmark: One way IPC microbenchmarks
    match: {Function: "seL4_Call (FPU)", "Same vspace?": false, "IPC length": 0}
    distribution: true

  - key: ipc_reply_fpu
    name: IPC ReplyRecv w/ FPU (cross-AS, len 0)
    benchmark: One way IPC microbenchmarks
    match: {Function: "seL4_ReplyRecv (FPU)", "Same vspace?": false, "IPC length": 0}
    distribution: true

  - key: ipc_call_intra
    name: IPC Call (same-AS, len 0)
    benchmark: One way IPC microbenchmarks
    match: {Function: seL4_Call, "Same vspace?": true, "IPC length": 0}
    distribution: true

  - key: ipc_reply_intra
    name: IPC ReplyRecv (same-AS, len 0)
    benchmark: One way IPC microbenchmarks
    match: {Function: seL4_ReplyRecv, "Same vspace?": true, "IPC length": 0}
    distribution: true

  - key: ipc_send
    name: IPC Send (cross-AS, len 0)
    benchmark: One way IPC microbenchmarks
    match: {Function: seL4_Send, "Same vspace?": false, "IPC length": 0}
    distribution: true

  - key: ipc_call_len10
    name: IPC Call (cross-AS, len 10)
    benchmark: One way IPC microbenchmarks
    match: {Function: seL4_Call, "Same vspace?": false, "IPC length": 10}
    distribution: true

  - key: ipc_reply_len10
    name: IPC ReplyRecv (cross-AS, len 10)
    benchmark: One way IPC microbenchmarks
    match: {Function: seL4_ReplyRecv, "Same vspace?": false, "IPC length": 10}
    distribution: true

  # --- IRQ
  - key: irq_noswitch
    name: IRQ path, no context switch
    benchmark: IRQ path cycle count (measured from user level)
    match: {Type: Without context switch}
    distribution: true

  - key: irq_noswitch_early
    name: IRQ path, no context switch (early processing)
    benchmark: IRQ path cycle count (measured from user level)
    match: {Type: Without context switch (early processing)}
    distribution: false

  - key: irq_switch
    name: IRQ path, with context switch
    benchmark: IRQ path cycle count (measured from user level)
    match: {Type: With context switch}
    distribution: true

  - key: irq_switch_early
    name: IRQ path, with context switch (early processing)
    benchmark: IRQ path cycle count (measured from user level)
    match: {Type: With context switch (early processing)}
    distribution: false

  # --- Signal (Prio 1)
  - key: notify_process
    name: Signal to process of higher prio
    benchmark: Signal to process of higher prio
    match: {Prio: 1}
    distribution: false

  - key: notify_thread
    name: Signal to thread of higher prio
    benchmark: Signal to thread of higher prio
    match: {Prio: 1}
    distribution: true

  - key: notify_process_early
    name: Signal to process of higher prio (early processing)
    benchmark: Signal to process of higher prio (early processing)
    match: {Prio: 1}
    distribution: false

  - key: notify_thread_early
    name: Signal to thread of higher prio (early processing)
    benchmark: Signal to thread of higher prio (early processing)
    match: {Prio: 1}
    distribution: false

  - key: notify_high_thread
    name: Signal to high prio thread
    benchmark: Signal to high prio thread
    match: {}
    distribution: true

  - key: notify_high_thread_early
    name: Signal to high prio thread (early processing)
    benchmark: Signal to high prio thread (early processing)
    match: {}
    distribution: false

  - key: notify_low_thread
    name: Signal to low prio thread
    benchmark: Signal to low prio thread
    match: {}
    distribution: true

  # --- Yield
  - key: thread_yield
    name: Thread yield
    benchmark: Thread yield
    match: {}
    distribution: true

  - key: thread_yield_early
    name: Thread yield (early processing)
    benchmark: Thread yield (early processing)
    match: {}
    distribution: false

  - key: process_yield
    name: Process yield
    benchmark: Process yield
    match: {}
    distribution: true

  - key: process_yield_early
    name: Process yield (early processing)
    benchmark: Process yield (early processing)
    match: {}
    distribution: false

  # --- Producer / consumer
  - key: producer_to_consumer
    name: Producer to consumer
    benchmark: Producer to consumer
    match: {}
    distribution: true

  - key: producer_to_consumer_early
    name: Producer to consumer (early processing)
    benchmark: Producer to consumer (early processing)
    match: {}
    distribution: false

  - key: consumer_to_producer
    name: Consumer to producer
    benchmark: Consumer to producer
    match: {}
    distribution: true

  - key: consumer_to_producer_early
    name: Consumer to producer (early processing)
    benchmark: Consumer to producer (early processing)
    match: {}
    distribution: false

  # --- Faults (does not exist in all configs)
  - key: fault_round_trip
    name: Fault round trip
    benchmark: fault round trip
    match: {}
    distribution: true

  - key: fault_round_trip_early
    name: Fault round trip (early processing)
    benchmark: fault round trip (early processing)
    match: {}
    distribution: false

  - key: fault_to_handler
    name: Faulter -> fault handler
    benchmark: faulter -> fault handler
    match: {}
    distribution: true

  - key: fault_to_handler_early
    name: Faulter -> fault handler (early processing)
    benchmark: faulter -> fault handler (early processing)
    match: {}
    distribution: false

  - key: fault_from_handler
    name: Fault handler -> faulter
    benchmark: fault handler -> faulter
    match: {}
    distribution: true

  - key: fault_from_handler_early
    name: Fault handler -> faulter (early processing)
    benchmark: fault handler -> faulter (early processing)
    match: {}
    distribution: false

  # --- Baseline / syscall overhead
  - key: nop_syscall
    name: Nop syscall overhead
    benchmark: Nop syscall overhead
    match: {}
    distribution: true

  - key: null_syscall
    name: Hardware null_syscall
    benchmark: Hardware null_syscall thread
    match: {}
    distribution: true

  - key: null_syscall_early
    name: Hardware null_syscall (early processing)
    benchmark: Hardware null_syscall thread (early processing)
    match: {}
    distribution: false

  - key: signal_overhead
    name: Signal overhead
    benchmark: Signal overhead
    match: {}
    distribution: true

  # --- Page mapping
  # N=1 for overhead; N=2048 for less noise. Other results almost exactly linear.
  - key: map_1
    name: Map pages (1 page)
    benchmark: Mapping Benchmark
    match: {Phase: Mapping, "Num of Page Mapped": 1}
    distribution: true

  - key: map_2048
    name: Map pages (2048 pages)
    benchmark: Mapping Benchmark
    match: {Phase: Mapping, "Num of Page Mapped": 2048}
    distribution: true

  - key: protect_1
    name: Protect pages read-only (1 page)
    benchmark: Mapping Benchmark
    match: {Phase: Protect Pages as Read Only, "Num of Page Mapped": 1}
    distribution: true

  - key: protect_2048
    name: Protect pages read-only (2048 pages)
    benchmark: Mapping Benchmark
    match: {Phase: Protect Pages as Read Only, "Num of Page Mapped": 2048}
    distribution: true

  - key: unprotect_1
    name: Unprotect pages (1 page)
    benchmark: Mapping Benchmark
    match: {Phase: Unprotect Pages, "Num of Page Mapped": 1}
    distribution: true

  - key: unprotect_2048
    name: Unprotect pages (2048 pages)
    benchmark: Mapping Benchmark
    match: {Phase: Unprotect Pages, "Num of Page Mapped": 2048}
    distribution: true

  # --- SMP
  - key: smp_1core_c500
    name: SMP throughput, 1 core, high contention (500 cycles)
    benchmark: SMP Benchmark
    match: {Cores: 1, Cycles: 500}
    distribution: true

  - key: smp_4core_c500
    name: SMP throughput, 4 cores, high contention (500 cycles)
    benchmark: SMP Benchmark
    match: {Cores: 4, Cycles: 500}
    distribution: true

  - key: smp_1core_c32000
    name: SMP throughput, 1 core, low contention (32000 cycles)
    benchmark: SMP Benchmark
    match: {Cores: 1, Cycles: 32000}
    distribution: true

  - key: smp_4core_c32000
    name: SMP throughput, 4 cores, low contention (32000 cycles)
    benchmark: SMP Benchmark
    match: {Cores: 4, Cycles: 32000}
    distribution: true

# Not tracked:
#   - Wait time
#   - Broadcast time
#   - PMU event counters (non-cycle metrics):
#     - Average to reschedule current thread
#     - Average signal to low prio thread
#     - Average seL4_Yield (no thread switch)
#     - no sure these are useful, we have not looked at them in years
#   - overheads specific to sel4bench
#     - IRQ Measurement overhead
#     - fault overhead
#     - Read ccnt overhead
#
# Thinned:
#   - Signal: rest of the priorities untracked; no interesting data
#   - SMP Benchmark: 2 & 3 cores and other cycle counts left out, look linear
#   - Mapping Benchmark: other page counts are linear;
#                        other phases (alloc/prep) not really page mapping
